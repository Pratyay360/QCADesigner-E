name: AppImage
on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]  # Also trigger on version tags
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build AppImage inside Docker
        run: |
          docker build \
            --file ContainerFile \
            --target appimage \
            --tag qcadesignere-appimage \
            .

      - name: Extract AppImage from container
        run: |
          id=$(docker create qcadesignere-appimage)
          docker cp "$id:/app/QCADesignerE-x86_64.AppImage" ./QCADesignerE-x86_64.AppImage
          docker rm "$id"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@main
        with:
          name: QCADesignerE-AppImage
          path: ./QCA*.AppImage
          if-no-files-found: error

      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/')  # Only run on tag pushes
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: QCADesignerE-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
